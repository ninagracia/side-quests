<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Kitchen Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ground -->
  <div class="ground"></div>

  <!-- Cloud 1 -->
  <div class="cloud-wrap" style="top:14%;left:10%;">
    <div class="cloud-body" style="width:75px;height:26px;">
      <div class="cloud-puff" style="width:36px;height:36px;top:-18px;left:8px;"></div>
      <div class="cloud-puff" style="width:26px;height:26px;top:-12px;left:36px;"></div>
    </div>
  </div>

  <!-- Cloud 2 -->
  <div class="cloud-wrap" style="top:24%;right:14%;">
    <div class="cloud-body" style="width:55px;height:20px;">
      <div class="cloud-puff" style="width:28px;height:28px;top:-14px;left:6px;"></div>
      <div class="cloud-puff" style="width:20px;height:20px;top:-10px;left:28px;"></div>
    </div>
  </div>

  <!-- Pipe left -->
  <div class="pipe-wrap" style="left:16px;">
    <div class="pipe-head" style="width:48px;height:14px;"></div>
    <div class="pipe-body" style="width:36px;height:85px;margin-left:6px;"></div>
  </div>

  <!-- Pipe left-2 -->
  <div class="pipe-wrap" style="left:68px;">
    <div class="pipe-head" style="width:42px;height:14px;"></div>
    <div class="pipe-body" style="width:30px;height:115px;margin-left:6px;"></div>
  </div>

  <!-- Pipe right -->
  <div class="pipe-wrap" style="right:0;">
    <div class="pipe-head" style="width:62px;height:14px;"></div>
    <div class="pipe-body" style="width:50px;height:135px;margin-left:6px;"></div>
  </div>

  <!-- Question block -->
  <div class="qblock" style="bottom:200px;left:90px;">?</div>

  <!-- Main content: two centred buttons -->
  <div class="content" style="
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; min-height:calc(100vh - 130px);
    gap:30px; padding:40px 30px;">

    <a href="freezer.html" class="mario-btn">KITCHEN</a>
    <div class="mario-btn disabled">TBD</div>

  </div>

</body>
</html>
