<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Freezer Inventory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ground -->
  <div class="ground"></div>

  <!-- Cloud -->
  <div class="cloud-wrap" style="top:8%;right:10%;">
    <div class="cloud-body" style="width:60px;height:22px;">
      <div class="cloud-puff" style="width:30px;height:30px;top:-15px;left:7px;"></div>
      <div class="cloud-puff" style="width:22px;height:22px;top:-10px;left:30px;"></div>
    </div>
  </div>

  <!-- Pipe left -->
  <div class="pipe-wrap" style="left:10px;">
    <div class="pipe-head" style="width:48px;height:14px;"></div>
    <div class="pipe-body" style="width:36px;height:75px;margin-left:6px;"></div>
  </div>

  <!-- Pipe right -->
  <div class="pipe-wrap" style="right:0;">
    <div class="pipe-head" style="width:62px;height:14px;"></div>
    <div class="pipe-body" style="width:50px;height:128px;margin-left:6px;"></div>
  </div>

  <!-- Question block -->
  <div class="qblock" style="bottom:200px;left:100px;">?</div>

  <!-- Main content -->
  <div class="content">
    <a href="index.html" class="back-btn">&#8592; BACK</a>
    <div class="page-title">FREEZER INVENTORY</div>

    <table class="inventory-table">
      <thead>
        <tr>
          <th onclick="sortTable('category')">
            CATEGORY <span id="arrow-category">&#8597;</span>
          </th>
          <th onclick="sortTable('date')">
            DATE <span id="arrow-date">&#8597;</span>
          </th>
          <th onclick="sortTable('item')">
            ITEM <span id="arrow-item">&#8597;</span>
          </th>
          <th>NOTES</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Floating Add (+) Button -->
  <div class="fab" onclick="openForm()">+</div>

  <!-- Add Item — bottom sheet -->
  <div class="form-overlay" id="formOverlay" onclick="handleOverlayClick(event)">
    <div class="form-sheet">
      <h2>ADD ITEM</h2>

      <!-- Category row: dropdown + manage button -->
      <div class="form-row">
        <label>
          Category
          <button class="cat-manage-btn" onclick="openCatManager()" title="Manage categories">&#9998;</button>
        </label>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
          <select id="fieldCategory" onchange="handleCatChange(this)">
            <!-- populated by JS -->
          </select>
          <!-- Inline add-new row (hidden until "+ Add new..." is chosen) -->
          <div id="catAddRow" style="display:none;display:flex;gap:6px;align-items:center;">
            <input type="text" id="newCatInput" placeholder="New category name"
                   style="flex:1;padding:8px 10px;border:none;border-radius:8px;background:#deeeff;font-size:13px;outline:none;">
            <button onclick="confirmAddCat()"
                    style="padding:8px 12px;border:none;border-radius:8px;background:#e87030;color:white;font-size:16px;font-weight:bold;cursor:pointer;">&#10003;</button>
            <button onclick="cancelAddCat()"
                    style="padding:8px 12px;border:none;border-radius:8px;background:#ccc;color:#333;font-size:16px;cursor:pointer;">&#10007;</button>
          </div>
        </div>
      </div>

      <div class="form-row">
        <label>Date</label>
        <input type="date" id="fieldDate">
      </div>

      <div class="form-row">
        <label>Item</label>
        <input type="text" id="fieldItem" placeholder="e.g. Chicken breast">
      </div>

      <div class="form-row">
        <label>Note</label>
        <textarea id="fieldNote" placeholder="e.g. 2 packs, expires soon..."></textarea>
      </div>

      <div class="form-actions">
        <button class="btn-cancel" onclick="closeForm()">cancel</button>
        <button class="btn-save"   onclick="saveItem()">save</button>
      </div>
    </div>
  </div>

  <!-- Manage Categories overlay -->
  <div class="form-overlay" id="catManagerOverlay" onclick="handleCatManagerClick(event)">
    <div class="form-sheet">
      <h2>MANAGE CATEGORIES</h2>
      <ul id="catList" style="list-style:none;padding:0;margin:0;"></ul>
      <div style="margin-top:20px;text-align:center;">
        <button class="btn-save" onclick="closeCatManager()">DONE</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">Item saved!</div>

  <style>
    .cat-manage-btn {
      background: none; border: none; cursor: pointer;
      font-size: 14px; color: #2020c8; margin-left: 6px;
      padding: 2px 4px; vertical-align: middle;
    }
    .cat-manage-btn:hover { color: #e87030; }
    .cat-list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 8px; border-bottom: 1px solid #eee;
      font-family: 'Press Start 2P', cursive; font-size: 8px; color: #333;
    }
    .cat-list-item:last-child { border-bottom: none; }
    .cat-del-btn {
      background: #e84040; color: white; border: none;
      border-radius: 6px; padding: 5px 9px; font-size: 12px;
      cursor: pointer; font-weight: bold; flex-shrink: 0;
    }
    .cat-del-btn:hover { background: #c02020; }
  </style>

  <script>
    const STORAGE_KEY     = 'freezer_items';
    const CAT_KEY         = 'freezer_categories';
    const DEFAULT_CATS    = ['Bread','Dairy','Fruits','Leftovers','Meat','Other','Seafood','Vegetables'];
    let sortField = null;
    let sortAsc   = true;

    /* ── Category helpers ── */
    function loadCategories() {
      try {
        const stored = JSON.parse(localStorage.getItem(CAT_KEY));
        return (stored && stored.length) ? stored : [...DEFAULT_CATS];
      } catch { return [...DEFAULT_CATS]; }
    }
    function saveCategories(cats) {
      localStorage.setItem(CAT_KEY, JSON.stringify(cats));
    }

    function populateCategorySelect(selectedVal) {
      const sel = document.getElementById('fieldCategory');
      const cats = loadCategories();
      sel.innerHTML =
        '<option value="">-- select --</option>' +
        cats.map(c => `<option value="${esc(c)}"${c === selectedVal ? ' selected' : ''}>${esc(c)}</option>`).join('') +
        '<option value="__add_new__">&#10010; Add new category...</option>';
      if (selectedVal) sel.value = selectedVal;
    }

    /* ── Handle dropdown change ── */
    function handleCatChange(sel) {
      if (sel.value === '__add_new__') {
        sel.value = '';
        const row = document.getElementById('catAddRow');
        row.style.display = 'flex';
        document.getElementById('newCatInput').focus();
      }
    }

    function confirmAddCat() {
      const input = document.getElementById('newCatInput');
      const name  = input.value.trim();
      if (!name) { input.focus(); return; }

      const cats = loadCategories();
      if (cats.some(c => c.toLowerCase() === name.toLowerCase())) {
        alert('Category already exists!'); return;
      }
      cats.push(name);
      cats.sort((a,b) => a.localeCompare(b));
      saveCategories(cats);
      populateCategorySelect(name);
      document.getElementById('fieldCategory').value = name;
      document.getElementById('catAddRow').style.display = 'none';
      input.value = '';
    }

    function cancelAddCat() {
      document.getElementById('catAddRow').style.display = 'none';
      document.getElementById('newCatInput').value = '';
      document.getElementById('fieldCategory').value = '';
    }

    /* ── Manage categories overlay ── */
    function openCatManager() {
      renderCatList();
      document.getElementById('catManagerOverlay').classList.add('active');
    }
    function closeCatManager() {
      document.getElementById('catManagerOverlay').classList.remove('active');
      populateCategorySelect();   // refresh dropdown after edits
    }
    function handleCatManagerClick(e) {
      if (e.target === document.getElementById('catManagerOverlay')) closeCatManager();
    }

    function renderCatList() {
      const cats = loadCategories();
      const ul   = document.getElementById('catList');
      if (!cats.length) {
        ul.innerHTML = '<li class="cat-list-item" style="justify-content:center;color:#bbb;">No categories yet</li>';
        return;
      }
      ul.innerHTML = cats.map((c, i) => `
        <li class="cat-list-item">
          <span>${esc(c)}</span>
          <button class="cat-del-btn" onclick="deleteCategory(${i})">&#10007;</button>
        </li>`).join('');
    }

    function deleteCategory(index) {
      const cats = loadCategories();
      const name = cats[index];
      if (!confirm('Delete category "' + name + '"?')) return;
      cats.splice(index, 1);
      saveCategories(cats);
      renderCatList();
    }

    /* ── Item data helpers ── */
    function loadItems() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function saveItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    /* ── Escape HTML ── */
    function esc(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ── Render table ── */
    function renderTable() {
      const items = loadItems();
      const tbody = document.getElementById('tableBody');

      if (!items.length) {
        tbody.innerHTML =
          '<tr class="empty-msg"><td colspan="4">No items yet — tap + to add!</td></tr>';
        return;
      }

      let sorted = [...items];
      if (sortField) {
        sorted.sort((a, b) => {
          const va = (a[sortField] || '').toLowerCase();
          const vb = (b[sortField] || '').toLowerCase();
          return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        });
      }

      tbody.innerHTML = sorted.map(r => `
        <tr>
          <td>${esc(r.category)}</td>
          <td>${esc(r.date)}</td>
          <td>${esc(r.item)}</td>
          <td>${esc(r.note)}</td>
        </tr>`).join('');
    }

    /* ── Sort ── */
    function sortTable(field) {
      sortAsc = sortField === field ? !sortAsc : true;
      sortField = field;
      ['category','date','item'].forEach(f => {
        const el = document.getElementById('arrow-' + f);
        if (el) el.innerHTML = f === field ? (sortAsc ? '&#8593;' : '&#8595;') : '&#8597;';
      });
      renderTable();
    }

    /* ── Add-Item form open / close ── */
    function openForm() {
      document.getElementById('fieldDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('fieldItem').value  = '';
      document.getElementById('fieldNote').value  = '';
      document.getElementById('catAddRow').style.display = 'none';
      populateCategorySelect();
      document.getElementById('formOverlay').classList.add('active');
    }
    function closeForm() {
      document.getElementById('formOverlay').classList.remove('active');
    }
    function handleOverlayClick(e) {
      if (e.target === document.getElementById('formOverlay')) closeForm();
    }

    /* ── Save item ── */
    function saveItem() {
      const item = document.getElementById('fieldItem').value.trim();
      if (!item) { alert('Item name is required!'); return; }

      const items = loadItems();
      items.push({
        id:       Date.now(),
        category: document.getElementById('fieldCategory').value,
        date:     document.getElementById('fieldDate').value,
        item:     item,
        note:     document.getElementById('fieldNote').value.trim()
      });
      saveItems(items);
      closeForm();
      renderTable();
      showToast();
    }

    /* ── Toast ── */
    function showToast() {
      const t = document.getElementById('toast');
      t.classList.remove('show');
      void t.offsetWidth;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    /* ── Init ── */
    renderTable();
  </script>

</body>
</html>
